name: Atualizar Frase Diária

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia as 08:00 UTC
  workflow_dispatch: # Permite rodar manualmente clicando num botão (bom para testar)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão para o robô editar seu arquivo

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Rodar script Python
        run: python update_readme.py

      - name: Commitar e dar Push nas mudanças
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Atualizando frase do dia" || exit 0
          git push